<!DOCTYPE html>
<html>

<head>

    <title>
        AI Support Agent
    </title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <div class="chat-container">


        <h2>
            🤖 AI Support Agent
        </h2>


        <div id="chat-box">

        </div>



        <div class="input-area">


            <input
                type="text"
                id="user-input"
                placeholder="Describe Your Issue..."
            >


            <button onclick="sendMessage()">
                Send
            </button>

            <button onclick="clearChat()">
                Clear Chat
            </button>


        </div>


    </div>



    <script src="script.js"></script>


</body>


</html>
